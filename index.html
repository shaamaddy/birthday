<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Princess</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:black;
overflow-x:hidden;
}

/* LOCK SCREEN */

#lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:9999;
padding:20px;
}

.lock-title{
font-family:'Pacifico',cursive;
font-size:42px;
margin-bottom:10px;
}

.lock-sub{
font-size:18px;
opacity:.9;
margin-bottom:8px;
}

.lock-date{
font-size:16px;
opacity:.6;
margin-bottom:20px;
}

#countdown{
font-size:40px;
letter-spacing:2px;
text-shadow:
0 0 10px #ff9bdc,
0 0 20px #ff9bdc,
0 0 40px #ff4fcf;
}

/* INTRO */

#introScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:9997;
}

.glow-text{
font-family:'Pacifico',cursive;
font-size:42px;
color:white;
text-shadow:
0 0 10px #ff9bdc,
0 0 20px #ff9bdc,
0 0 40px #ff4fcf,
0 0 80px #ff4fcf;
animation:glowPulse 2s infinite alternate;
pointer-events:none;
}

@keyframes glowPulse{
from{transform:scale(1)}
to{transform:scale(1.06)}
}

/* PAGE SYSTEM */

.page{
display:none;
min-height:100vh;
text-align:center;
padding:60px 20px;
opacity:0;
transform:translateY(20px);
transition:opacity .8s, transform .8s;
}

.page.active{
display:block;
opacity:1;
transform:translateY(0);
}

/* BUTTON */

.button{
margin-top:45px;
padding:18px 48px;
background:#7a3e9d;
border:none;
color:white;
font-size:19px;
border-radius:35px;
cursor:pointer;
}

/* PAGE 1 */

.first-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("bg1.jpg") center/contain no-repeat;
background-color:#ffd6c7;
z-index:-2;
}

.first-overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(255,200,180,0.35);
z-index:-1;
}

.overlay-text{
position:absolute;
top:8%;
width:100%;
font-family:'Pacifico',cursive;
font-size:48px;
color:white;
}

.image-container img{
max-width:90%;
max-height:70vh;
margin-top:40px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,.35);
}

/* HEARTS */

.heart{
position:absolute;
color:#ff6b8a;
font-size:20px;
animation:heartFloat 6s infinite alternate;
}

@keyframes heartFloat{
from{transform:translateY(-10px)}
to{transform:translateY(15px)}
}

/* PAGE 2 */

.lavender-page{
background:radial-gradient(circle,#f4e8f8,#d8bde3);
}

.full-image{
width:90%;
max-width:1100px;
margin-top:30px;
border-radius:20px;
}

/* PAGE 3 SCROLLING BACKGROUND */

.final-page{
background:url("third.jpg");
background-size:300px;
background-repeat:repeat;
animation:scrollBg 20s linear infinite;
display:flex;
justify-content:center;
align-items:center;
}

@keyframes scrollBg{
from{background-position:0 0;}
to{background-position:0 -600px;}
}

/* FINAL MESSAGE BOX */

.final-box{
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:20px;
width:60%;
max-width:600px;
text-align:center;
line-height:1.8;
color:#4b2d5a;
font-size:18px;
margin:auto;
}

.goodbye{
margin-top:30px;
font-size:26px;
color:#7a3e9d;
opacity:0;
transition:opacity 2s;
}

.goodbye.show{
opacity:1;
}

/* CINEMATIC */

#cinematicFade{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0;
transition:opacity 3.5s ease;
z-index:9999;
pointer-events:none;
}

#finalNote{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-family:'Pacifico',cursive;
font-size:34px;
color:#ff8fcf;
opacity:0;
transition:opacity 2s;
z-index:10000;
}

.blurOut{
animation:blurScene 3s forwards;
}

@keyframes blurScene{
0%{filter:blur(0)}
100%{filter:blur(6px)}
}

</style>

</head>

<body>

<div id="cinematicFade"></div>
<div id="finalNote">TAKE CARE MUU 💗</div>

<!-- LOCK SCREEN -->

<div id="lockScreen">

<h1 class="lock-title">A Surprise Is Waiting 🎁</h1>

<div class="lock-sub">Something special is waiting for you…</div>

<div class="lock-date">Come back again on March 23.</div>

<div id="countdown"></div>

</div>

<!-- INTRO -->

<div id="introScreen" onclick="startSite()">
<div class="glow-text">Tap To Begin ✨</div>
</div>

<!-- MUSIC (ONLY PAGE 2) -->

<audio id="song2" src="song.mp3" loop></audio>

<!-- PAGE 1 -->

<div id="page1" class="page">

<div class="first-bg"></div>
<div class="first-overlay"></div>

<div class="overlay-text">Happy Birthday Princess 👑</div>

<div class="image-container">
<img src="first.jpg">
</div>

<button class="button" onclick="go('page2')">Continue 💜</button>

</div>

<!-- PAGE 2 -->

<div id="page2" class="page lavender-page">

<img src="secondpage.jpg" class="full-image">

<button class="button" onclick="go('page3')">One more page 💜</button>

</div>

<!-- PAGE 3 -->

<div id="page3" class="page final-page">

<div id="finalContent" class="final-box">
<p id="typeText"></p>
<div id="goodbye" class="goodbye">GOOD-BYE DEAR…</div>
</div>

</div>

<script>

/* COUNTDOWN TIMER */

var unlockDate = new Date("March 23, 2026 00:00:00").getTime();

var timer=setInterval(function(){

var now=new Date().getTime();
var distance=unlockDate-now;

if(distance<0){

lockScreen.style.display="none";
introScreen.style.display="flex";
clearInterval(timer);

}else{

var days=Math.floor(distance/(1000*60*60*24));
var hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes=Math.floor((distance%(1000*60*60))/(1000*60));
var seconds=Math.floor((distance%(1000*60))/1000);

countdown.innerHTML=
days+"d "+hours+"h "+minutes+"m "+seconds+"s";

}

},1000);

/* START SITE */

function startSite(){
introScreen.style.display="none";
document.getElementById("page1").classList.add("active");
}

/* PAGE SWITCH */

function go(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");

song2.pause();

if(page==="page2"){
song2.play();
}

if(page==="page3"){
startTyping();
}

}

/* HEARTS */

function createHearts(){

for(let i=0;i<30;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"%";
heart.style.top=Math.random()*90+"%";

page1.appendChild(heart);

}

}

/* TYPEWRITER MESSAGE */

var message=`Even if we haven’t spoken in months,
you still mean something to me.

I truly wish you a beautiful future —
full of success, peace, and everything your heart deserves.

I miss my special friend —
even if I don’t say it out loud.

I’ll always wish good things for you — quietly.`;

let i=0;

function startTyping(){

function type(){

if(i<message.length){

typeText.innerHTML+=message.charAt(i);
i++;
setTimeout(type,40);

}else{

goodbye.classList.add("show");

setTimeout(()=>{
finalContent.classList.add("blurOut");
fadeMovie();
},2500);

}

}

type();

}

/* CINEMATIC END */

function fadeMovie(){

cinematicFade.style.opacity=1;

setTimeout(()=>{
finalNote.style.opacity=1;
},3000);

setTimeout(()=>{
finalNote.style.opacity=0;
},5000);

}

window.onload=function(){
createHearts();
}

</script>

</body>
</html>
